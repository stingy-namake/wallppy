name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'               # Triggers on tags like v1.0.0, v2.1, etc.

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'    # Compatible with anyio 4.13+

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          # Use the tag name (e.g., v1.0.0) and embed it into the binary name
          TAG="${{ github.ref_name }}"          # e.g., v1.0.0
          BINARY_NAME="wallpy-linux-${TAG}"     # e.g., wallpy-linux-v1.0.0
          pyinstaller --onefile --name "$BINARY_NAME" wallpy/main.py

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/wallpy-linux-*            # Uploads the raw binary
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}