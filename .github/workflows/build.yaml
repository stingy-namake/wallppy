name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04  # Use older Ubuntu for better compatibility
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libfontconfig1 \
            libfreetype6 \
            libx11-xcb1 \
            libxcb-glx0 \
            libxcb-dri2-0 \
            libxcb-dri3-0 \
            libxcb-present0 \
            libxcb-composite0 \
            libxcb-cursor0 \
            libxcb-damage0 \
            libxcb-dpms0 \
            libxcb-record0 \
            libxcb-res0 \
            libxcb-screensaver0 \
            libxcb-shm0 \
            libxcb-xv0 \
            libxcb-xvmc0 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxrender1 \
            libxi6 \
            libsm6 \
            libice6

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Clean and build binary
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          BINARY_NAME="wallppy-linux-${TAG}"
          
          # Clean any previous builds
          rm -rf dist/ build/ *.spec
          
          # Build with PyInstaller
          pyinstaller \
            --onefile \
            --name "$BINARY_NAME" \
            --add-data ".resources:.resources" \
            --icon ".resources/wallppy.ico" \
            --noconfirm \
            main.py
          
          # Verify the binary
          echo "Binary size:"
          ls -lh dist/

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/wallppy-linux-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}