name: Build and Release (Linux & Windows)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  actions: read

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libfontconfig1 \
            libfreetype6 \
            libx11-xcb1 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxrender1 \
            libxi6 \
            libsm6 \
            libice6 \
            dbus-x11 \
            dconf-cli \
            dconf-gsettings-backend \
            gsettings-desktop-schemas

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine version name
        id: version
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "TAG=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            BRANCH="${{ github.ref_name }}"
            SAFE_BRANCH="${BRANCH//\//-}"   # replace / with -
            SHA_SHORT=$(git rev-parse --short HEAD)
            echo "TAG=${SAFE_BRANCH}-${SHA_SHORT}" >> $GITHUB_OUTPUT
          fi

      - name: Build binary with PyInstaller
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          echo "Building version: $TAG"
          
          rm -rf dist/ build/ *.spec
          
          pyinstaller \
            --onefile \
            --name "wallppy-linux-${TAG}" \
            --add-data ".resources:.resources" \
            --icon ".resources/wallppy.ico" \
            --noconfirm \
            --noupx \
            main.py
          
          echo "Binary size:"
          ls -lh dist/
          
          chmod +x "dist/wallppy-linux-${TAG}"
          
          echo "Linked libraries:"
          ldd "dist/wallppy-linux-${TAG}" 2>&1 | head -20 || true

      - name: Prepare release assets
        run: |
          TAG="${{ steps.version.outputs.TAG }}"
          
          mkdir -p "wallppy-${TAG}-linux"
          cp "dist/wallppy-linux-${TAG}" "wallppy-${TAG}-linux/wallppy"
          cp -r .resources "wallppy-${TAG}-linux/"
          cp wallppy-installer.sh "wallppy-${TAG}-linux/"
          
          tar -czf "dist/wallppy-${TAG}-linux.tar.gz" "wallppy-${TAG}-linux/"
          
          chmod +x wallppy-installer.sh
          cp wallppy-installer.sh "dist/wallppy-installer.sh"

      - name: Upload artifacts (always available)
        uses: actions/upload-artifact@v4
        with:
          name: wallppy-linux-${{ steps.version.outputs.TAG }}
          path: |
            dist/wallppy-linux-*
            dist/wallppy-*-linux.tar.gz
            dist/wallppy-installer.sh
          retention-days: 7

      - name: Upload to GitHub Release (only on tag push)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/wallppy-linux-*
            dist/wallppy-*-linux.tar.gz
            dist/wallppy-installer.sh
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine version name
        id: version
        run: |
          if (${{ github.ref_type }} -eq "tag") {
            echo "TAG=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT
          } else {
            $BRANCH = "${{ github.ref_name }}"
            $SAFE_BRANCH = $BRANCH -replace '/', '-'
            $SHA_SHORT = git rev-parse --short HEAD
            echo "TAG=${SAFE_BRANCH}-${SHA_SHORT}" >> $env:GITHUB_OUTPUT
          }

      - name: Build binary with PyInstaller
        run: |
          $TAG = "${{ steps.version.outputs.TAG }}"
          Write-Host "Building version: $TAG"
          
          Remove-Item -Recurse -Force dist/, build/, *.spec -ErrorAction SilentlyContinue
          
          pyinstaller `
            --onefile `
            --name "wallppy-windows-${TAG}" `
            --add-data ".resources;resources" `
            --icon ".resources/wallppy.ico" `
            --noconfirm `
            --noupx `
            main.py
          
          Write-Host "Binary size:"
          Get-Item dist/* | Select-Object Name, Length | Format-Table -AutoSize

      - name: Prepare release assets
        run: |
          $TAG = "${{ steps.version.outputs.TAG }}"
          
          New-Item -ItemType Directory -Path "wallppy-${TAG}-windows" -Force | Out-Null
          Copy-Item "dist/wallppy-windows-${TAG}.exe" "wallppy-${TAG}-windows/wallppy.exe"
          Copy-Item -Recurse .resources "wallppy-${TAG}-windows/"
          
          Compress-Archive -Path "wallppy-${TAG}-windows/" -DestinationPath "dist/wallppy-${TAG}-windows.zip" -Force

      - name: Upload artifacts (always available)
        uses: actions/upload-artifact@v4
        with:
          name: wallppy-windows-${{ steps.version.outputs.TAG }}
          path: |
            dist/wallppy-windows-*
            dist/wallppy-*-windows.zip
          retention-days: 7

      - name: Upload to GitHub Release (only on tag push)
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/wallppy-windows-*
            dist/wallppy-*-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}