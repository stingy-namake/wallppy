name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies for Qt5
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-sync1 \
            libxcb-xfixes0 \
            libxcb-xinerama0 \
            libxcb-xkb1 \
            libxcb-util1 \
            libxkbcommon-x11-0 \
            libgl1-mesa-glx \
            libegl1-mesa \
            libfontconfig1 \
            libfreetype6 \
            libx11-xcb1 \
            libxcb-glx0 \
            libxcb-dri2-0 \
            libxcb-dri3-0 \
            libxcb-present0 \
            libxcb-composite0 \
            libxcb-cursor0 \
            libxcb-damage0 \
            libxcb-dpms0 \
            libxcb-record0 \
            libxcb-res0 \
            libxcb-screensaver0 \
            libxcb-shm0 \
            libxcb-xv0 \
            libxcb-xvmc0 \
            libglib2.0-0 \
            libdbus-1-3 \
            libxrender1 \
            libxi6 \
            libsm6 \
            libice6 \
            libgsettings-qt1 \
            libglib2.0-bin \
            dconf-gsettings-backend \
            gsettings-desktop-schemas

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create PyInstaller spec file
        run: |
          cat > wallppy.spec << 'EOF'
          # -*- mode: python ; coding: utf-8 -*-
          
          a = Analysis(
              ['main.py'],
              pathex=[],
              binaries=[],
              datas=[('.resources', '.resources')],
              hiddenimports=[
                  'PIL',
                  'PIL.Image',
                  'PIL._imaging',
                  'requests',
                  'urllib3',
                  'certifi',
                  'charset_normalizer',
                  'bs4',
                  'core.extension',
                  'core.settings',
                  'core.workers',
                  'core.wallpaper_manager',
                  'core.crash_handler',
                  'ui.main_window',
                  'ui.landing_page',
                  'ui.results_page',
                  'ui.wallpaper_widget',
                  'extensions',
                  'extensions.wallhaven',
                  'extensions.local',
                  'extensions.fourkwallpapers',
              ],
              hookspath=[],
              hooksconfig={},
              runtime_hooks=[],
              excludes=[],
              noarchive=False,
          )
          
          pyz = PYZ(a.pure)
          
          exe = EXE(
              pyz,
              a.scripts,
              a.binaries,
              a.datas,
              [],
              name='wallppy',
              debug=False,
              bootloader_ignore_signals=False,
              strip=False,
              upx=True,
              upx_exclude=[],
              runtime_tmpdir=None,
              console=False,
              disable_windowed_traceback=False,
              argv_emulation=False,
              target_arch=None,
              codesign_identity=None,
              entitlements_file=None,
              icon='.resources/wallppy.ico',
          )
          EOF

      - name: Build binary with PyInstaller
        run: |
          TAG="${{ github.ref_name }}"
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          
          # Clean any previous builds
          rm -rf dist/ build/
          
          # Build with spec file
          pyinstaller --noconfirm wallppy.spec
          
          # Rename the binary
          mv dist/wallppy "dist/wallppy-linux-${TAG}"
          
          # Verify the binary
          echo "Binary size:"
          ls -lh dist/
          
          # Test that the binary can at least show help (basic sanity check)
          chmod +x "dist/wallppy-linux-${TAG}"
          echo "Binary created successfully"

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/wallppy-linux-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}