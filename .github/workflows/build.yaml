name: Build and Release Linux Binary

on:
  push:
    tags:
      - 'v*'               # Triggers on tags like v1.0.0
  workflow_dispatch:        # Allows manual trigger (uses branch name as tag)

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build binary with PyInstaller
        run: |
          TAG="${{ github.ref_name }}"
          # For manual runs without a tag, use the branch name (e.g., 'master')
          if [ "$TAG" = "manual" ]; then TAG="${GITHUB_REF#refs/heads/}"; fi
          BINARY_NAME="wallppy-linux-${TAG}"
          pyinstaller --onefile --name "$BINARY_NAME" wallppy/main.py

      - name: Upload binary to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/wallppy-linux-*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}